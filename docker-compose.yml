services:

  # ── Single production container ─────────────────────────────────────────────
  # Source and UI are baked into the image at build time.
  # The backend serves the pre-built UI from ui/dist/ as static files.
  # Rebuild the image whenever source or UI changes:
  #   docker compose build && docker compose up
  app:
    build: .
    ports:
      - "80:8000"
      - "10001:10001"
      - "10002:10002"
    command: python -m astrolol.main
