services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "10001:10001"
      - "10002:10002"
    command: python -m astrolol.main

  # ── Vite dev server (hot-reload UI) ────────────────────────────────────────
  frontend:
    build: .
    volumes:
      - .:/app
      # Preserve the node_modules baked into the image — without this the
      # source bind-mount would shadow /app/ui/node_modules with the (likely
      # absent) host directory.  Docker seeds this named volume from the image
      # on first run (only when the volume is empty).
      # IMPORTANT: after any change to ui/package.json, run
      #   docker compose -f docker-compose-dev.yml down -v
      #   docker compose -f docker-compose-dev.yml up
      # to drop the stale volume so it is reseeded from the new image.
      - ui_node_modules:/app/ui/node_modules
    ports:
      - "80:5173"
    environment:
      # Vite proxy target: use the Docker Compose service name, not localhost.
      - BACKEND_URL=http://backend:8000
    # --host binds Vite to 0.0.0.0 so it is reachable outside the container.
    command: npm --prefix /app/ui run dev -- --host
    depends_on:
      - backend

volumes:
  ui_node_modules:
